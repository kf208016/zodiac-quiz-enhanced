      min-width: 320px;
      max-width: 450px;
      text-align: center;
    }
    
    .wheel-container {
      position: relative;
      width: 350px;
      height: 350px;
      margin: 0 auto;
    }
    
    /* 轉盤 */
    .wheel {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      position: relative;
      transition: transform 4s cubic-bezier(0.17, 0.67, 0.12, 0.99);
      box-shadow: 
        0 0 0 8px rgba(255, 215, 0, 0.3),
        0 0 0 12px rgba(168, 85, 247, 0.2),
        0 0 60px rgba(168, 85, 247, 0.4),
        inset 0 0 30px rgba(0,0,0,0.3);
    }
    
    .wheel-segment {
      position: absolute;
      width: 50%;
      height: 50%;
      left: 50%;
      top: 0;
      transform-origin: 0% 100%;
      clip-path: polygon(0% 100%, 100% 0%, 0% 0%);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .wheel-segment .icon {
      position: absolute;
      font-size: 1.8rem;
      transform: rotate(15deg) translateY(-15px);
    }
    
    .wheel-segment .text {
      position: absolute;
      font-size: 0.7rem;
      color: #fff;
      transform: rotate(15deg) translateY(-35px);
      text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
      white-space: nowrap;
    }
    
    /* 轉盤中心 */
    .wheel-center {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #ffd700, #ff6b6b);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      box-shadow: 0 0 20px rgba(255, 215, 0, 0.6);
      z-index: 10;
      cursor: pointer;
      transition: transform 0.3s, box-shadow 0.3s;
    }
    
    .wheel-center:hover {
      transform: translate(-50%, -50%) scale(1.1);
      box-shadow: 0 0 30px rgba(255, 215, 0, 0.8);
    }
    
    /* 指針 */
    .pointer {
      position: absolute;
      top: -15px;
      left: 50%;
      transform: translateX(-50%);
      width: 30px;
      height: 40px;
      z-index: 20;
    }
    
    .pointer::before {
      content: '▼';
      font-size: 2rem;
      color: #ffd700;
      text-shadow: 0 0 10px rgba(255, 215, 0, 0.8);
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
    }
    
    /* 點讚裝飾線 */
    .sparkle {
      position: absolute;
      width: 20px;
      height: 20px;
      background: radial-gradient(circle, #ffd700, transparent);
      border-radius: 50%;
      animation: sparkle 1.5s ease-in-out infinite;
    }
    
    @keyframes sparkle {
      0%, 100% { opacity: 0; transform: scale(0); }
      50% { opacity: 1; transform: scale(1); }
    }
    
    /* 控制區 */

      margin-top: 25px;
    }

      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      margin-bottom: 20px;

    .zodiac-btn {

      height: 55px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.05);

      transition: all 0.3s;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
    }
    
    .zodiac-btn span {
      font-size: 0.6rem;
      margin-top: 2px;
      color: rgba(255,255,255,0.7);
    }
    
    .zodiac-btn:hover {
      border-color: #ffd700;
      background: rgba(255, 215, 0, 0.1);
      transform: translateY(-3px);
    }
    
    .zodiac-btn.selected {
      border-color: #ffd700;
      background: rgba(255, 215, 0, 0.2);
      box-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
      transform: scale(1.1);
    }
    
    .spin-btn {
      padding: 15px 50px;
      font-size: 1.3rem;
      font-weight: 700;
      background: linear-gradient(135deg, #ffd700, #ff6b6b);
      border: none;
      border-radius: 50px;
      color: #fff;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 5px 20px rgba(255, 107, 107, 0.4);
      text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
    }
    
    .spin-btn:hover:not(:disabled) {
      transform: translateY(-3px);
      box-shadow: 0 8px 30px rgba(255, 107, 107, 0.6);
    }
    
    .spin-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      animation: pulse 1s infinite;
    }
    
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    
    /* 結果區 */

      text-align: center;

    @keyframes fadeIn {

    }
    
    .result-icon {

      margin-bottom: 15px;

      left: 0;

      height: 100%;
      pointer-events: none;
      z-index: 100;
      opacity: 0;

    .lucky-burst.show {

    .lucky-burst .particle {
      position: absolute;
      width: 10px;
      height: 10px;
      background: #ffd700;
      border-radius: 50%;
      animation: burst 1s ease-out forwards;
    }
    
    @keyframes burst {
      0% { transform: scale(0) translate(0, 0); opacity: 1; }

          '木星帶來好運與擴張的能量！今天適合訂定旅行計畫或學習新事物。',
          '冒險精神高漲，勇敢踏出舒適圈吧！',
          '保持樂觀的心態，宇宙正在回應你的願望。'
        ] },
      { name: '摩羯座', icon: '♑', element: '土', ruler: '土星', color: '#adb5bd',
        fortunes: [
          '土星賦予你踏實與耐心，今天的付出會在未來獲得回報。',
          '事業上有重要的進展機會，保持專注和努力。',
          '設立長遠目標並一步步前進，成功就在不遠處等著你。'
        ] },
      { name: '水瓶座', icon: '♒', element: '風', ruler: '天王星', color: '#91a7ff',
        fortunes: [
          '天王星帶來創新與靈感！今天會有特別的想法閃過腦海。',
          '與朋友的交流會給你帶來新的啟發，踴躍表達吧！',
          '做獨特的自己，不跟随他人腳步走出自己的路。'
        ] },
      { name: '雙魚座', icon: '♓', element: '水', ruler: '海王星', color: '#63e6be',
        fortunes: [
          '海王星啟發你的想像力與創造力，適合藝術創作或冥想。',
          '直覺特別敏銳，聆听內在的聲音會得到答案。',
          '今天容易感受到宇宙的愛與支持，世界以你為中心運轉。'
        ] }
    ];
    
    // 幸運提示庫
    const fortuneBank = {
      love: [
        '單身者今天人氣飆升，可能在社交場合遇到心動的對象',
        '有伴者與另一半的互動更加甜蜜，彼此更能理解對方',
        '今天是告白的好日子，勇氣會帶來好消息',
        '注意沟通方式，表達感受能讓關係更加和諧',
        '舊愛可能會突然聯繫，想清楚再回應'
      ],
      career: [
        '工作上出現新機會，勇敢抓住它吧',
        '團隊合作順利，與同事的配合度極高',
        '有貴人運，有人默默在幫助你',
        '適合處理談判或簡報，表現會獲得賞識',
        '創意大爆發，想法受到上司讚賞'
      ],
      money: [
        '有意外之財的機會，可能是紅包或獎金',
        '今天的消費直覺很準，買東西特別划算',
        '適合開始儲蓄或投資，長期眼光會帶來回報',
        '有借錢給人的機會，想清楚再決定',
        '偏財運不錯，可以試試手氣'
      ]
    };
    
    // 全域變數
    let selectedZodiac = null;
    let isSpinning = false;
    let currentRotation = 0;
    
    // 初始化
    function init() {
      createStars();
      createWheel();
      createZodiacButtons();
      setupEventListeners();
    }
    
    // 建立星空背景
    function createStars() {
      const starsContainer = document.getElementById('stars');
      for (let i = 0; i < 100; i++) {
        const star = document.createElement('div');
        star.style.cssText = `
          position: absolute;
          left: ${Math.random() * 100}%;
          top: ${Math.random() * 100}%;
          width: ${Math.random() * 3 + 1}px;
          height: ${Math.random() * 3 + 1}px;
          background: rgba(255,255,255,${Math.random() * 0.8 + 0.2});
          border-radius: 50%;
          animation: twinkle ${Math.random() * 3 + 2}s ease-in-out infinite;
          animation-delay: ${Math.random() * 2}s;
        `;
        starsContainer.appendChild(star);
      }
    }
    
    // 建立轉盤
    function createWheel() {
      const wheel = document.getElementById('wheel');
      const segmentAngle = 360 / 12;
      
      for (let i = 0; i < 12; i++) {
        const segment = document.createElement('div');
        segment.className = 'wheel-segment';
        segment.style.background = `linear-gradient(${i * 30}deg, ${zodiacData[i].color}44, ${zodiacData[i].color}22)`;
        segment.style.transform = `rotate(${i * segmentAngle - 90}deg)`;
        segment.style.clipPath = 'polygon(0% 100%, 100% 0%, 0% 0%)';
        
        // 圖示
        const icon = document.createElement('div');
        icon.className = 'icon';
        icon.textContent = zodiacData[i].icon;
        segment.appendChild(icon);
        
        // 名稱
        const text = document.createElement('div');
        text.className = 'text';
        text.textContent = zodiacData[i].name;
        segment.appendChild(text);
        
        wheel.appendChild(segment);
      }
    }
    
    // 建立星座選擇按鈕
    function createZodiacButtons() {
      const container = document.getElementById('zodiacSelect');
      zodiacData.forEach((zodiac, index) => {
        const btn = document.createElement('button');
        btn.className = 'zodiac-btn';
        btn.innerHTML = `${zodiac.icon}<span>${zodiac.name.replace('座','')}</span>`;
        btn.dataset.index = index;
        btn.style.borderColor = zodiac.color + '66';
        btn.addEventListener('click', () => selectZodiac(index));
        container.appendChild(btn);
      });
    }
    
    // 選擇星座
    function selectZodiac(index) {
      selectedZodiac = index;
      
      // 更新 UI
      document.querySelectorAll('.zodiac-btn').forEach((btn, i) => {
        btn.classList.toggle('selected', i === index);
      });
      
      document.getElementById('spinBtn').disabled = false;
      document.getElementById('wheelCenter').textContent = zodiacData[index].icon;
    }
    
    // 設定事件監聽
    function setupEventListeners() {
      document.getElementById('spinBtn').addEventListener('click', spinWheel);
      document.getElementById('wheelCenter').addEventListener('click', () => {
        if (!isSpinning && selectedZodiac !== null) {
          spinWheel();
        }
      });
      document.getElementById('shareBtn').addEventListener('click', shareResult);
    }
    
    // 轉動轉盤
    function spinWheel() {
      if (isSpinning || selectedZodiac === null) return;
      
      isSpinning = true;
      const spinBtn = document.getElementById('spinBtn');
      spinBtn.disabled = true;
      spinBtn.textContent = '✨ 轉動中...';
      
      // 計算轉動角度
      // 轉 5-8 圈 + 隨機偏移讓結果隨機
      const extraSpins = 5 + Math.floor(Math.random() * 4);
      const randomOffset = Math.random() * 360;
      const targetAngle = extraSpins * 360 + randomOffset;
      
      currentRotation += targetAngle;
      
      // 套用轉動動畫
      const wheel = document.getElementById('wheel');
      wheel.style.transform = `rotate(${currentRotation}deg)`;
      
      // 等待動畫結束
      setTimeout(() => {
        isSpinning = false;
        spinBtn.textContent = '🎡 再次轉動';
        spinBtn.disabled = false;
        showResult();
      }, 4000);
    }
    
    // 顯示結果
    function showResult() {
      const zodiac = zodiacData[selectedZodiac];
      
      // 根據今天日期产生确定性的随机索引
      const today = new Date();
      const dateSeed = today.getFullYear() * 10000 + (today.getMonth() + 1) * 100 + today.getDate();
      const fortuneIdx = (dateSeed + selectedZodiac) % 3;
      
      // 幸運數字
      const luckyNumbers = [
        [(dateSeed % 9) + 1, (dateSeed % 9) + 4, (dateSeed % 9) + 7],
        [(dateSeed % 8) + 2, (dateSeed % 8) + 5, (dateSeed % 8) + 9],
        [(dateSeed % 7) + 1, (dateSeed % 7) + 3, (dateSeed % 7) + 8]
      ][selectedZodiac % 3];
      
      // 更新結果 UI
      document.getElementById('resultIcon').textContent = zodiac.icon;
      document.getElementById('resultZodiac').textContent = zodiac.name;
      document.getElementById('fortuneText').textContent = zodiac.fortunes[fortuneIdx];
      document.getElementById('loveFortune').textContent = fortuneBank.love[(dateSeed + selectedZodiac) % fortuneBank.love.length];
      document.getElementById('careerFortune').textContent = fortuneBank.career[(dateSeed + selectedZodiac) % fortuneBank.career.length];
      document.getElementById('moneyFortune').textContent = fortuneBank.money[(dateSeed + selectedZodiac) % fortuneBank.money.length];
      document.getElementById('luckyNum').textContent = luckyNumbers.join(', ');
      
      // 顯示結果區
      const resultSection = document.getElementById('resultSection');
      resultSection.classList.add('show');
      
      // 幸運爆發效果
      createLuckyBurst();
    }
    
    // 幸運爆發效果
    function createLuckyBurst() {
      const burst = document.getElementById('luckyBurst');
      burst.innerHTML = '';
      burst.classList.add('show');
      
      for (let i = 0; i < 30; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        const angle = (i / 30) * Math.PI * 2;
        const distance = 100 + Math.random() * 200;
        particle.style.cssText = `
          left: 50%;
          top: 40%;
          background: ${['#ffd700', '#ff6b6b', '#a855f7', '#51cf66'][i % 4]};
          --tx: ${Math.cos(angle) * distance}px;
          --ty: ${Math.sin(angle) * distance}px;
          animation-delay: ${Math.random() * 0.3}s;
        `;
        burst.appendChild(particle);
      }
      
      setTimeout(() => {
        burst.classList.remove('show');
      }, 1500);
    }
    
    // 分享結果
    function shareResult() {
      const zodiac = zodiacData[selectedZodiac];
      const text = `🎡 星座幸運轉盤\n\n我的今日星座：${zodiac.icon} ${zodiac.name}\n${document.getElementById('fortuneText').textContent}\n\n✨ 玩玩看：`;
      
      if (navigator.share) {
        navigator.share({
          title: '星座幸運轉盤',
          text: text,
          url: window.location.href
        });
      } else {
        // 複製到剪貼簿
        navigator.clipboard.writeText(text + window.location.href).then(() => {
          alert('已複製到剪貼簿！');
        });
      }
    }
    
    // 啟動
    init();

    // 隱私權橫幅關閉（事件委派 + 強健 selector）
document.addEventListener('click', function(e) {
  if (e.target.closest('[data-action="dismiss-privacy"]')) {
    var banner = document.querySelector('.privacy-banner, .privacy-notice, #privacyBanner, [data-privacy-banner]');
    if (banner) {
      banner.style.display = 'none';
      banner.classList.add('hidden');
    }
    try { localStorage.setItem('privacyDismissed', 'true'); } catch(err) {}
  }
});

// 確保全域也可呼叫
window.dismissPrivacyBanner = function() {
  var banner = document.querySelector('.privacy-banner, .privacy-notice, #privacyBanner, [data-privacy-banner]');
  if (banner) {
    banner.style.display = 'none';
    banner.classList.add('hidden');
  }
  try { localStorage.setItem('privacyDismissed', 'true'); } catch(err) {}
};

// 頁面載入時檢查是否已關閉過
document.addEventListener('DOMContentLoaded', function() {
  if (localStorage.getItem('privacyDismissed') === 'true') {
    var banner = document.querySelector('.privacy-banner, .privacy-notice, #privacyBanner, [data-privacy-banner]');
    if (banner) {
      banner.style.display = 'none';
      banner.classList.add('hidden');
    }
  }
});

    function sanitizeForHTML(str) {
      if (str == null) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }
  </script>
</body>
