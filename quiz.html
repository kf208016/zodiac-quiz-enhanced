// === 當前語言 ===
let currentLang = 'zh-TW';

// === 翻譯關鍵字 ===
function t(key, params = {}) {
  let text = translations[currentLang][key] || key;
  Object.entries(params).forEach(([k, v]) => {
    text = text.replace(`{${k}}`, v);
  });
  return text;
}

// === 初始化語言 ===
function initLanguage() {
  const savedLang = localStorage.getItem('quiz-lang') || 'zh-TW';
  setLanguage(savedLang);
}

// === 設定語言 ===
function setLanguage(lang) {
  currentLang = lang;
  localStorage.setItem('quiz-lang', lang);
  document.documentElement.lang = lang;

  // 更新語言按鈕狀態
  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.lang === lang);
  });

  // 更新所有可翻譯元素
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.dataset.i18n;
    const params = el.dataset.i18nParams ? JSON.parse(el.dataset.i18nParams) : {};
    if (key !== 'quiz_progress' || el.id === 'progressLabel') {
      el.textContent = t(key, params);
    }
  });

  // 更新進度條文字
  updateProgressText();

  // 觸發 languageChanged 事件
  window.dispatchEvent(new CustomEvent('languageChanged', { detail: { lang } }));
}

// === 語言切換監聽 ===
window.addEventListener('languageChanged', () => {
  // 重新渲染問答
  if (typeof loadQuestion === 'function' && currentQuestion < quizData.length) {
    loadQuestion();
  }
});

// === 語言按鈕事件 ===
document.addEventListener('DOMContentLoaded', () => {
  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.addEventListener('click', () => setLanguage(btn.dataset.lang));
  });
  initLanguage();
});

// === 遊戲狀態 ===
let currentQuestion = 0;
let scores = {};
let selectedOptions = [];

// === 初始化 ===
function init() {
  createStarfield();
  loadQuestion();
  Object.keys(zodiacResults).forEach(z => scores[z] = 0);
}

// === 建立星空背景 ===
function createStarfield() {
  const container = document.getElementById('starfield');
  for (let i = 0; i < 100; i++) {
    const star = document.createElement('div');
    star.className = 'star';
    star.style.left = Math.random() * 100 + '%';
    star.style.top = Math.random() * 100 + '%';
    star.style.animationDelay = Math.random() * 3 + 's';
    star.style.opacity = Math.random() * 0.5 + 0.3;
    container.appendChild(star);
  }
}

// === 翻譯 Helper ===
function qt(key) {
  return questionTranslations[currentLang][key] || key;
}

// === 更新進度文字 ===
function updateProgressText() {
  const el = document.querySelector('[data-i18n="quiz_progress"]');
  if (el) {
    el.textContent = t('quiz_progress', { current: currentQuestion + 1, total: quizData.length });
  }
}

// === 載入問題 ===
function loadQuestion() {
  const q = quizData[currentQuestion];
  const progress = ((currentQuestion + 1) / quizData.length) * 100;

  document.getElementById('progressPct').textContent = Math.round(progress) + '%';
  document.getElementById('progressFill').style.width = progress + '%';
  document.getElementById('zodiacIcon').textContent = q.icon;
  document.getElementById('questionText').textContent = qt(q.questionKey);

  // 更新進度文字
  updateProgressText();

  const optionsContainer = document.getElementById('optionsContainer');
  optionsContainer.innerHTML = '';

  const letters = ['A', 'B', 'C', 'D'];
  q.options.forEach((opt, idx) => {
    const btn = document.createElement('button');
    btn.className = 'option' + (selectedOptions[currentQuestion] === idx ? ' selected' : '');
    btn.innerHTML = `<span class="option-letter">${letters[idx]}</span><span class="option-text">${qt(opt.textKey)}</span>`;
    btn.onclick = () => selectOption(idx);
    optionsContainer.appendChild(btn);
  });

  document.getElementById('quizSection').classList.add('fade-in');
}

// === 選擇選項 ===
function selectOption(idx) {
  selectedOptions[currentQuestion] = idx;

  const q = quizData[currentQuestion];
  const selectedScores = q.options[idx].scores;
  Object.entries(selectedScores).forEach(([zodiac, score]) => {
    scores[zodiac] = (scores[zodiac] || 0) + score;
  });

  const options = document.querySelectorAll('.option');
  options.forEach((opt, i) => {
    opt.classList.toggle('selected', i === idx);
  });

  setTimeout(() => {
    if (currentQuestion < quizData.length - 1) {
      currentQuestion++;
      loadQuestion();
    } else {
      showResult();
    }
  }, 400);
}

// === 顯示結果 ===
function showResult() {
  let maxZodiac = 'aries';
  let maxScore = 0;
  Object.entries(scores).forEach(([zodiac, score]) => {
    if (score > maxScore) {
      maxScore = score;
      maxZodiac = zodiac;
    }
  });

  const result = zodiacResults[maxZodiac];

  document.getElementById('quizSection').style.display = 'none';
  document.getElementById('progressContainer').style.display = 'none';

  const resultSection = document.getElementById('resultSection');
  resultSection.classList.add('active');
  resultSection.classList.add('fade-in');

  document.getElementById('resultZodiac').textContent = result.icon;
  document.getElementById('resultTitle').textContent = t(`zodiac_${maxZodiac}_title`);
  document.getElementById('resultSubtitle').textContent = t(`zodiac_${maxZodiac}_subtitle`);
  document.getElementById('resultDesc').textContent = t(`zodiac_${maxZodiac}_desc`);

  const matchItems = document.getElementById('matchItems');
  matchItems.innerHTML = result.games.map(g =>
    `<span class="match-item">${translateGameType(g)}</span>`
  ).join('');

  // 顯示結果區的按鈕
  document.getElementById('startBtnGroup').style.display = 'none';
  document.getElementById('restartBtnGroup').style.display = 'flex';
}

// === 開始測驗 ===
function startQuiz() {
  document.getElementById('resultSection').classList.remove('active');
  document.getElementById('quizSection').style.display = 'block';
  document.getElementById('progressContainer').style.display = 'block';
  currentQuestion = 0;
  selectedOptions = [];
  Object.keys(scores).forEach(z => scores[z] = 0);
  loadQuestion();
}

// === 返回首頁 ===
function backToHome() {
  window.location.href = 'index.html';
}

// === 分享結果 ===
function shareResult() {
  const resultTitle = document.getElementById('resultTitle').textContent;
  const text = t('result_share_text', { result: resultTitle });

  if (navigator.share) {
    navigator.share({
      title: t('quiz_title'),
      text: text,
      url: window.location.href
    });
  } else {
    navigator.clipboard.writeText(text + ' ' + window.location.href).then(() => {
      alert(t('copied_text'));
    });
  }
}

// === 重新開始 ===
function restartQuiz() {
  currentQuestion = 0;
  selectedOptions = [];
  Object.keys(scores).forEach(z => scores[z] = 0);

  document.getElementById('quizSection').style.display = 'block';
  document.getElementById('progressContainer').style.display = 'block';
  document.getElementById('resultSection').classList.remove('active');
  document.getElementById('startBtnGroup').style.display = 'flex';
  document.getElementById('restartBtnGroup').style.display = 'none';
}

init();

    function sanitizeForHTML(str) {
  if (str == null) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}
