function validateBirthDate(year, month, day) {
  const y = parseInt(year), m = parseInt(month), d = parseInt(day);
  if (isNaN(y) || y < 1900 || y > 2030) return false;
  if (isNaN(m) || m < 1 || m > 12) return false;
  if (isNaN(d) || d < 1 || d > 31) return false;
  return true;
}

function validateCoordinates(coordStr) {
  const parts = coordStr.split(',');
  if (parts.length !== 3) return false;
  const lat = parseFloat(parts[1]), lon = parseFloat(parts[2]);
  if (isNaN(lat) || lat < -90 || lat > 90) return false;
  if (isNaN(lon) || lon < -180 || lon > 180) return false;
  return true;
}

function validateTime(timeStr) {
  return /^([01]d|2[0-3]):([0-5]d)$/.test(timeStr);
}

function sanitizeInput(str) {
  if (str == null) return '';
  return String(str).replace(/[<>"'&]/g, '').trim().slice(0, 200);
}

// === 星座計算 ===
function getZodiacIndex(degree) {
  const d = ((degree % 360) + 360) % 360; // 標準化到 0-360
  return Math.floor(d / 30) % 12;
}

function getZodiacSign(degree) {
  return zodiacSigns[getZodiacIndex(degree)];
}

function degreeToDMS(degree) {
  // 標準化到 0-359 範圍
  const normalized = ((degree % 360) + 360) % 360;
  const deg = Math.floor(normalized % 30); // 取 30 度內的度數
  const minFloat = (normalized % 1) * 60;
  const min = Math.floor(minFloat);
  const sec = Math.round((minFloat - min) * 60);
  return { deg, min, sec };
}

// === 簡化天文計算（演示用）===
function calculatePlanets(jd, lat, lon) {
  // 基於簡化的黃道帶計算
  // 實際應用中應使用 ephemeris 數據
  const positions = {};
  
  // 使用傳入的 jd（儒略日期）計算，而不是 new Date()
  // jd 是自出生日期計算的天文時間
  const daysSinceJ2000 = jd - 2451545.0;
  const sunMean = daysSinceJ2000 / 36525.0; // 儒略世紀
  const sunLong = (280.46646 + sunMean * 36000.76983 + sunMean * sunMean * 0.000033) % 360;
  
  // 根據儒略日期計算當天的位置
  // 一天的 fraction = (jd % 1) 代表當天的時間
  const dayFraction = jd % 1;
  const dayOfYear = ((jd - Math.floor(jd)) * 365.25 + daysSinceJ2000) % 365.25;
  
  // 太陽位置（根據出生日期的儒略日計算）
  const sunBase = (sunLong + dayFraction * 360) % 360;
  positions.sun = { sign: zodiacSigns[getZodiacIndex(sunBase)], degree: sunBase % 30, retrograde: false };
  
  // 月亮（大約27.3天繞一圈）
  const moonPhase = ((daysSinceJ2000 / 27.3) * 360 + 180) % 360;
  positions.moon = { sign: zodiacSigns[getZodiacIndex(moonPhase)], degree: moonPhase % 30, retrograde: false };
  
  // 其他行星（根據儒略日期的簡化計算）
  const planetOffsets = {
    mercury: 50,
    venus: 90,
    mars: 150,
    jupiter: 200,
    saturn: 250,
    uranus: 280,
    neptune: 310,
    pluto: 330
  };
  
  planets.slice(2).forEach((p, i) => {
    const baseOffset = planetOffsets[p.key] || i * 40;
    // 使用儒略日期而非 dayOfYear，確保每次輸入相同日期產生相同結果
    const variation = (daysSinceJ2000 * 0.01 * (i + 1)) % 30;
    const long = (baseOffset + variation) % 360;
    // 逆行基於行星特性，不使用隨機值
    const isRetrograde = (p.key === 'uranus' || p.key === 'neptune' || p.key === 'pluto') && 
                         Math.sin(daysSinceJ2000 * 0.01 + i) > 0.5;
    positions[p.key] = { sign: zodiacSigns[getZodiacIndex(long)], degree: long % 30, retrograde: isRetrograde };
  });

  return positions;
}

// === 計算宮位（deterministic）===
function calculateHouses(lat, houseSystem) {
  const houses = [];
  // 使用固定的數學公式，確保相同輸入產生相同輸出
  for (let i = 1; i <= 12; i++) {
    // Placidus 公式簡化版
    const baseHouse = (i - 1) * 30;
    const latFactor = Math.sin(lat * Math.PI / 180) * (i * 15);
    const houseDeg = (baseHouse + latFactor) % 360;
    houses.push({
      house: i,
      sign: zodiacSigns[getZodiacIndex(houseDeg)],
      degree: Math.abs(houseDeg % 30)
    });
  }
  return houses;
}

// === 計算相位 ===
function calculateAspects(positions) {
  const foundAspects = [];
  const planetKeys = Object.keys(positions);
  
  for (let i = 0; i < planetKeys.length; i++) {
    for (let j = i + 1; j < planetKeys.length; j++) {
      const p1 = planetKeys[i];
      const p2 = planetKeys[j];
      
      // 計算相位（簡化）
      const pos1 = (positions[p1].sign.deg + positions[p1].degree) % 360;
      const pos2 = (positions[p2].sign.deg + positions[p2].degree) % 360;
      let diff = Math.abs(pos1 - pos2);
      if (diff > 180) diff = 360 - diff;
      
      // 檢查各個相位
      for (const aspect of aspects) {
        if (Math.abs(diff - aspect.deg) <= aspect.orb) {
          foundAspects.push({
            planet1: p1,
            planet2: p2,
            aspect: aspect,
            orb: Math.abs(diff - aspect.deg)
          });
        }
      }
    }
  }
  
  return foundAspects.slice(0, 12); // 最多12個相位
}

      <div class="element-name">${el}象</div>

      <div class="element-bar"><div class="element-bar-fill" style="width:${(count/maxElement)*100}%;background:${elementColors[el]};"></div></div>
    </div>
  `).join('');
  
  // === 渲染幸運條件 ===
  const luckyGrid = document.getElementById('luckyGrid');
  const sun = positions.sun.sign;
  const luckyIndex = getZodiacIndex(sun.deg + sun.deg) % 8;
  const luckyItems = [
    { icon: '🎨', label: '幸運色', values: ['紅','綠','黃','白','金','棕','粉','紫'], idx: luckyIndex },
    { icon: '🔮', label: '幸運寶石', values: ['紅寶石','翡翠','瑪瑙','月光石','琥珀','藍寶石','粉紅碧璽','石榴石'], idx: luckyIndex },
    { icon: '🌸', label: '幸運花', values: ['杜鵑花','牽牛花','茉莉花','百合花','向日葵','波斯菊','玫瑰花','扶桑花'], idx: luckyIndex },
    { icon: '🍀', label: '守護星', values: [sun.ruler], idx: 0 },
    { icon: '🌙', label: '吉日', values: ['一','二','三','四','五','六','日'], idx: getZodiacIndex(sun.deg) % 7 }
  ];
  luckyGrid.innerHTML = luckyItems.map(item => 
    `<div class="lucky-item"><span>${item.icon}</span><span>${item.label}：${item.values[item.idx]}</span></div>`
  ).join('');
  
  // 顯示結果
  document.getElementById('resultSection').classList.add('active');
}

// === 渲染星盤圖 ===
function renderChartWheel(positions, houses) {
  const chartWheel = document.getElementById('chartWheel');
  const centerX = 150, centerY = 150, radius = 120;
  
  let svg = `<svg viewBox="0 0 300 300" style="transform: rotate(-90deg);">`;
  
  // 外圈（星座）
  svg += `<circle cx="${centerX}" cy="${centerY}" r="${radius + 20}" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>`;
  
  // 內圈（宮位）
  svg += `<circle cx="${centerX}" cy="${centerY}" r="${radius - 10}" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="15"/>`;
  
  // 繪製行星位置
  const planetEntries = Object.entries(positions);
  planetEntries.forEach(([key, pos], i) => {
    const totalDeg = pos.sign.deg + pos.degree;
    const rad = (totalDeg * Math.PI) / 180;
    const x = centerX + (radius + 5) * Math.cos(rad);
    const y = centerY + (radius + 5) * Math.sin(rad);
    const p = planets.find(pl => pl.key === key);
    
    svg += `<text x="${x}" y="${y}" text-anchor="middle" dominant-baseline="middle" font-size="14">${p.icon}</text>`;
  });
  
  // 宮位線
  houses.forEach((h, i) => {
    const rad1 = ((h.house - 1) * 30 * Math.PI) / 180;
    const rad2 = (h.house * 30 * Math.PI) / 180;
    const x1 = centerX + (radius - 10) * Math.cos(rad1);
    const y1 = centerY + (radius - 10) * Math.sin(rad1);
    const x2 = centerX + (radius + 15) * Math.cos(rad1);
    const y2 = centerY + (radius + 15) * Math.sin(rad1);
    
    svg += `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>`;
    svg += `<text x="${x2}" y="${y2}" text-anchor="middle" dominant-baseline="middle" font-size="10" fill="#888">${h.house}</text>`;
  });
  
  // 星座符號
  zodiacSigns.forEach((z, i) => {
    const rad = (z.deg * Math.PI) / 180;
    const x = centerX + (radius + 30) * Math.cos(rad);
    const y = centerY + (radius + 30) * Math.sin(rad);
    svg += `<text x="${x}" y="${y}" text-anchor="middle" dominant-baseline="middle" font-size="16">${z.icon}</text>`;
  });
  
  svg += `</svg>`;
  
  // 中心資訊
  const sun = positions.sun;
  chartWheel.innerHTML = svg + `
    <div class="wheel-center" style="transform: translate(-50%, -50%) rotate(90deg);">
      <div class="sun-icon">☀️</div>
      <div class="sun-sign">${sun.sign.icon}</div>
      <div class="sun-deg">${sun.sign.name}</div>
    </div>
  `;
}

// === 更新日期選單天數 ===
function updateDayDropdown() {
  const year = parseInt(document.getElementById('birthYear').value) || new Date().getFullYear();
  const month = parseInt(document.getElementById('birthMonth').value) || 1;
  const maxDay = new Date(year, month, 0).getDate();
  const daySelect = document.getElementById('birthDay');
  const currentDay = parseInt(daySelect.value) || 1;
  
  // 清空並重建日期選項
  daySelect.innerHTML = '';
  for (let d = 1; d <= maxDay; d++) {
    const opt = document.createElement('option');
    opt.value = d;
    opt.textContent = d;
    if (d === Math.min(currentDay, maxDay)) opt.selected = true;
    daySelect.appendChild(opt);
  }
}

// === 初始化下拉選單 ===
function initDropdowns() {
  const yearSelect = document.getElementById('birthYear');
  const currentYear = new Date().getFullYear();
  for (let y = 1900; y <= currentYear; y++) {
    const opt = document.createElement('option');
    opt.value = y;
    opt.textContent = y;
    if (y === 1990) opt.selected = true;
    yearSelect.appendChild(opt);
  }
  
  // 初始化月份選項
  const monthSelect = document.getElementById('birthMonth');
  for (let m = 1; m <= 12; m++) {
    const opt = document.createElement('option');
    opt.value = m;
    opt.textContent = m + ' 月';
    if (m === 6) opt.selected = true;
    monthSelect.appendChild(opt);
  }
  
  // 初始化日期選項（預設最大值31）
  const daySelect = document.getElementById('birthDay');
  daySelect.innerHTML = '';
  for (let d = 1; d <= 31; d++) {
    const opt = document.createElement('option');
    opt.value = d;
    opt.textContent = d + ' 日';
    if (d === 15) opt.selected = true;
    daySelect.appendChild(opt);
  }
  
  // 年月變更時更新日期選單
  document.getElementById('birthYear').addEventListener('change', updateDayDropdown);
  document.getElementById('birthMonth').addEventListener('change', updateDayDropdown);
}

function updateDropdownLabels() {
  // 月份翻譯
  const monthSelect = document.getElementById('birthMonth');
  const monthLabels = currentLang === 'en'
    ? ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec']
    : ['1 月', '2 月', '3 月', '4 月', '5 月', '6 月', '7 月', '8 月', '9 月', '10 月', '11 月', '12 月'];
  for (let m = 1; m <= 12; m++) {
    const opt = monthSelect.querySelector(`option[value="${m}"]`);
    if (opt) opt.textContent = monthLabels[m - 1];
  }

  // 日期翻譯（保持數字不變，僅在需要時調整）
  const daySelect = document.getElementById('birthDay');
  const dayLabel = currentLang === 'en' ? '' : ' 日';
  daySelect.querySelectorAll('option').forEach(opt => {
    const d = parseInt(opt.value);
    opt.textContent = d + dayLabel;
  });
}

function sanitizeForHTML(str) {
  if (str == null) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}
