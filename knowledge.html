let currentFilter = 'all';
let currentLangData = null;

function createStarfield() {
  const container = document.getElementById('starfield');
  for (let i = 0; i < 100; i++) {
    const star = document.createElement('div');
    star.className = 'star';
    star.style.left = Math.random() * 100 + '%';
    star.style.top = Math.random() * 100 + '%';
    star.style.animationDelay = Math.random() * 3 + 's';
    container.appendChild(star);
  }
}

function getZodiacLangData(z) {
  const lang = currentLang || 'zh-TW';
  return {
    name: z.name[lang] || z.name['zh-TW'],
    dates: z.dates[lang] || z.dates['zh-TW'],
    elementLabel: z.elementLabel[lang] || z.elementLabel['zh-TW'],
    ruler: z.ruler[lang] || z.ruler['zh-TW'],
    traits: z.traits[lang] || z.traits['zh-TW'],
    career: z.career[lang] || z.career['zh-TW'],
    desc: z.desc[lang] || z.desc['zh-TW']
  };
}

function renderZodiac(data) {
  const grid = document.getElementById('zodiacGrid');
  grid.innerHTML = '';
  
  data.forEach(z => {
    const ld = getZodiacLangData(z);
    const card = document.createElement('div');
    card.className = 'zodiac-card';
    card.dataset.element = z.element;
    card.dataset.name = ld.name;
    
    const traitTags = ld.traits.map(t => `<span class="trait-tag">${t}</span>`).join('');
    const careerTags = ld.career.map(c => `<span class="career-tag">${c}</span>`).join('');
    
    card.innerHTML = `
      <div class="card-header" onclick="toggleCard(this.parentElement)">
        <div class="zodiac-icon">${z.icon}</div>
        <div class="zodiac-info">
          <h3>${ld.name}</h3>
          <div class="zodiac-dates">${ld.dates}</div>
        </div>
        <div class="expand-icon">▼</div>
      </div>
      <div class="card-body">
        <div class="detail-grid">
          <div class="detail-item">
            <div class="label" data-i18n="label_ruler">守護星</div>
            <div class="value">${ld.ruler}</div>
          </div>
          <div class="detail-item">
            <div class="label" data-i18n="label_element">元素</div>
            <div class="value">${ld.elementLabel}</div>
          </div>
        </div>
        
        <div class="traits">
          <h4 data-i18n="trait_personality">✨ 性格特質</h4>
          <div class="trait-tags">
            ${traitTags}
          </div>
        </div>
        
        <p class="description">${ld.desc}</p>
        
        <div class="career-section">
          <h4 data-i18n="career_suitable">💼 適合職業</h4>
          <div class="career-tags">
            ${careerTags}
          </div>
        </div>
      </div>
    `;
    
    grid.appendChild(card);
  });
}

function toggleCard(card) {
  card.classList.toggle('expanded');
}

function filterByElement(element) {
  currentFilter = element;
  document.querySelectorAll('.filter-tag').forEach(tag => {
    const filterValue = tag.getAttribute('data-filter');
    tag.classList.toggle('active', filterValue === element);
  });
  
  let filtered = zodiacData;
  if (element !== 'all') {
    filtered = zodiacData.filter(z => z.element === element);
  }
  
  const searchText = document.getElementById('searchInput').value.toLowerCase();
  if (searchText) {
    filtered = filtered.filter(z => {
      const ld = getZodiacLangData(z);
      return ld.name.toLowerCase().includes(searchText);
    });
  }
  
  renderZodiac(filtered);
}

function filterZodiac() {
  const searchText = document.getElementById('searchInput').value.toLowerCase();
  let filtered = zodiacData;
  
  if (currentFilter !== 'all') {
    filtered = filtered.filter(z => z.element === currentFilter);
  }
  
  if (searchText) {
    filtered = filtered.filter(z => {
      const ld = getZodiacLangData(z);
      return ld.name.toLowerCase().includes(searchText);
    });
  }
  
  renderZodiac(filtered);
}

// Listen for language changes
window.addEventListener('languageChanged', function(e) {
  renderZodiac(zodiacData.filter(z => {
    if (currentFilter !== 'all' && z.element !== currentFilter) return false;
    const ld = getZodiacLangData(z);
    const searchText = document.getElementById('searchInput').value.toLowerCase();
    if (searchText && !ld.name.toLowerCase().includes(searchText)) return false;
    return true;
  }));
});

document.addEventListener('click', function(e) {
  if (e.target.closest('[data-action="dismiss-privacy"]')) {
    var banner = document.querySelector('.privacy-banner, .privacy-notice, #privacyBanner, [data-privacy-banner]');
    if (banner) {
      banner.style.display = 'none';
      banner.classList.add('hidden');
    }
    try { localStorage.setItem('privacyDismissed', 'true'); } catch(err) {}
  }
});

  if (banner) {
    banner.style.display = 'none';
    banner.classList.add('hidden');
  }
  try { localStorage.setItem('privacyDismissed', 'true'); } catch(err) {}
};

    function sanitizeForHTML(str) {
      if (str == null) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }
