    function sanitizeForHTML(str) {
  if (str == null) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

    const restartBtn = document.getElementById('restartBtn');
    const gameOverOverlay = document.getElementById('gameOverOverlay');
    const pauseOverlay = document.getElementById('pauseOverlay');

    // === Initialize ===
    function initBoard() {
      board = [];
      for (let r = 0; r < ROWS; r++) {
        board[r] = [];
        for (let c = 0; c < COLS; c++) {
          board[r][c] = null;
        }
      }
    }

    function createStarfield() {
      const container = document.getElementById('starfield');
      for (let i = 0; i < 80; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        star.style.left = Math.random() * 100 + '%';
        star.style.top = Math.random() * 100 + '%';
        star.style.animationDelay = Math.random() * 3 + 's';
        container.appendChild(star);
      }
    }

    function getRandomPiece() {
      const idx = Math.floor(Math.random() * SHAPES.length);
      const shape = SHAPES[idx];
      return {
        shape: shape.shape.map(row => [...row]),
        color: shape.color,
        x: Math.floor((COLS - shape.shape[0].length) / 2),
        y: 0
      };
    }

    function rotatePiece(piece) {
      const rows = piece.shape.length;
      const cols = piece.shape[0].length;
      const rotated = [];
      for (let c = 0; c < cols; c++) {
        rotated[c] = [];
        for (let r = rows - 1; r >= 0; r--) {
          rotated[c][rows - 1 - r] = piece.shape[r][c];
        }
      }
      return rotated;
    }

    function validMove(piece, offsetX, offsetY, newShape) {
      const shape = newShape || piece.shape;
      for (let r = 0; r < shape.length; r++) {
        for (let c = 0; c < shape[r].length; c++) {
          if (shape[r][c]) {
            const newX = piece.x + c + offsetX;
            const newY = piece.y + r + offsetY;
            if (newX < 0 || newX >= COLS || newY >= ROWS) return false;
            if (newY >= 0 && board[newY][newX]) return false;
          }
        }
      }
      return true;
    }

    function lockPiece() {
      for (let r = 0; r < currentPiece.shape.length; r++) {
        for (let c = 0; c < currentPiece.shape[r].length; c++) {
          if (currentPiece.shape[r][c]) {
            const y = currentPiece.y + r;
            if (y < 0) {
              gameOver();
              return;
            }
            board[y][currentPiece.x + c] = currentPiece.color;
          }
        }
      }
      clearLines();
      spawnPiece();
    }

    function clearLines() {
      let cleared = 0;
      for (let r = ROWS - 1; r >= 0; r--) {
        if (board[r].every(cell => cell !== null)) {
          board.splice(r, 1);
          board.unshift(new Array(COLS).fill(null));
          cleared++;
          r++;
        }
      }
      if (cleared > 0) {
        const points = [0, 100, 300, 500, 800];
        score += points[cleared] || 1200;
        lines += cleared;
        level = Math.floor(lines / 10) + 1;
        dropInterval = Math.max(100, 1000 - (level - 1) * 100);
        updateDisplay();
      }
    }

    function spawnPiece() {
      currentPiece = nextPiece || getRandomPiece();
      nextPiece = getRandomPiece();
      if (!validMove(currentPiece, 0, 0)) {
        gameOver();
      }
      drawNextPiece();
    }

    function moveLeft() {
      if (gamePaused || !gameRunning) return;
      if (validMove(currentPiece, -1, 0)) {
        currentPiece.x--;
        draw();
      }
    }

    function moveRight() {
      if (gamePaused || !gameRunning) return;
      if (validMove(currentPiece, 1, 0)) {
        currentPiece.x++;
        draw();
      }
    }

    function moveDown() {
      if (gamePaused || !gameRunning) return;
      if (validMove(currentPiece, 0, 1)) {
        currentPiece.y++;
        draw();
        return true;
      }
      lockPiece();
      return false;
    }

    function hardDrop() {
      if (gamePaused || !gameRunning) return;
      while (validMove(currentPiece, 0, 1)) {
        currentPiece.y++;
        score += 2;
      }
      updateDisplay();
      lockPiece();
    }

    function rotateCW() {
      if (gamePaused || !gameRunning) return;
      const rotated = rotatePiece(currentPiece);
      if (validMove(currentPiece, 0, 0, rotated)) {
        currentPiece.shape = rotated;
        draw();
      } else if (validMove(currentPiece, 1, 0, rotated)) {
        currentPiece.shape = rotated;
        currentPiece.x++;
        draw();
      } else if (validMove(currentPiece, -1, 0, rotated)) {
        currentPiece.shape = rotated;
        currentPiece.x--;
        draw();
      }
    }

    function draw() {
      // Clear canvas
      ctx.fillStyle = '#0a0a1a';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Draw grid
      ctx.strokeStyle = 'rgba(255,255,255,0.05)';
      ctx.lineWidth = 1;
      for (let r = 0; r <= ROWS; r++) {
        ctx.beginPath();
        ctx.moveTo(0, r * BLOCK_SIZE);
        ctx.lineTo(canvas.width, r * BLOCK_SIZE);
        ctx.stroke();
      }
      for (let c = 0; c <= COLS; c++) {
        ctx.beginPath();
        ctx.moveTo(c * BLOCK_SIZE, 0);
        ctx.lineTo(c * BLOCK_SIZE, canvas.height);
        ctx.stroke();
      }

      // Draw board
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          if (board[r][c]) {
            drawBlock(ctx, c, r, board[r][c], BLOCK_SIZE);
          }
        }
      }

      // Draw current piece (with bounds check)
      if (currentPiece) {
        for (let r = 0; r < currentPiece.shape.length; r++) {
          for (let c = 0; c < currentPiece.shape[r].length; c++) {
            if (currentPiece.shape[r][c]) {
              const y = currentPiece.y + r;
              if (y >= 0 && y < ROWS) {
                drawBlock(ctx, currentPiece.x + c, y, currentPiece.color, BLOCK_SIZE);
              }
            }
          }
        }
      }

      // Ghost piece - drawn as outline only (disabled for clarity, uncomment to enable)
      /* if (currentPiece && gameRunning && !gamePaused) {
        let ghostY = currentPiece.y;
        while (validMove(currentPiece, 0, ghostY - currentPiece.y + 1) && ghostY < ROWS - 1) {
          ghostY++;
        }
        ctx.globalAlpha = 0.4;
        ctx.strokeStyle = currentPiece.color;
        ctx.lineWidth = 2;
        for (let r = 0; r < currentPiece.shape.length; r++) {
          for (let c = 0; c < currentPiece.shape[r].length; c++) {
            if (currentPiece.shape[r][c]) {
              const y = ghostY + r;
              if (y >= 0 && y < ROWS) {
                const px = (currentPiece.x + c) * BLOCK_SIZE + 2;
                const py = y * BLOCK_SIZE + 2;
                ctx.strokeRect(px, py, BLOCK_SIZE - 4, BLOCK_SIZE - 4);
              }
            }
          }
        }
        ctx.globalAlpha = 1;
        ctx.lineWidth = 1;
      } */
    }

    function drawBlock(context, x, y, color, size) {
      const padding = 2;
      context.fillStyle = color;
      context.fillRect(x * size + padding, y * size + padding, size - padding * 2, size - padding * 2);
      // Glow effect
      context.shadowColor = color;
      context.shadowBlur = 8;
      context.fillRect(x * size + padding, y * size + padding, size - padding * 2, size - padding * 2);
      context.shadowBlur = 0;
      // Inner highlight
      context.fillStyle = 'rgba(255,255,255,0.3)';
      context.fillRect(x * size + padding + 2, y * size + padding + 2, size - padding * 2 - 4, 3);
    }

    function drawNextPiece() {
      nextCtx.fillStyle = '#0a0a1a';
      nextCtx.fillRect(0, 0, nextCanvas.width, nextCanvas.height);
      if (!nextPiece) return;

      const shape = nextPiece.shape;
      const offsetX = (nextCanvas.width - shape[0].length * PREVIEW_BLOCK) / 2;
      const offsetY = (nextCanvas.height - shape.length * PREVIEW_BLOCK) / 2;

      for (let r = 0; r < shape.length; r++) {
        for (let c = 0; c < shape[r].length; c++) {
          if (shape[r][c]) {
            const x = offsetX + c * PREVIEW_BLOCK;
            const y = offsetY + r * PREVIEW_BLOCK;
            nextCtx.fillStyle = nextPiece.color;
            nextCtx.fillRect(x + 2, y + 2, PREVIEW_BLOCK - 4, PREVIEW_BLOCK - 4);
            nextCtx.shadowColor = nextPiece.color;
            nextCtx.shadowBlur = 5;
            nextCtx.fillRect(x + 2, y + 2, PREVIEW_BLOCK - 4, PREVIEW_BLOCK - 4);
            nextCtx.shadowBlur = 0;
          }
        }
      }
    }

    function updateDisplay() {
      scoreDisplay.textContent = score;
      levelDisplay.textContent = level;
      linesDisplay.textContent = lines;
    }

    function startGame() {
      initBoard();
      score = 0;
      level = 1;
      lines = 0;
      dropInterval = 1000;
      gameRunning = true;
      gamePaused = false;
      updateDisplay();
      spawnPiece();
      draw();

      startBtn.textContent = t('blocks_running');
      startBtn.disabled = true;
      pauseBtn.disabled = false;
      pauseBtn.textContent = t('blocks_pause');

      if (gameLoop) clearInterval(gameLoop);
      gameLoop = setInterval(gameTick, dropInterval);
    }

    function gameTick() {
      if (!gameRunning || gamePaused) return;
      if (!moveDown()) {
        // Piece locked
      }
      draw();
    }

    function togglePause() {
      if (!gameRunning) return;
      gamePaused = !gamePaused;
      if (gamePaused) {
        pauseOverlay.classList.add('active');
        pauseBtn.textContent = t('blocks_resume');
      } else {
        pauseOverlay.classList.remove('active');
        pauseBtn.textContent = t('blocks_pause');
      }
    }

    function restartGame() {
      gameOverOverlay.classList.remove('active');
      startBtn.textContent = t('blocks_start');
      startBtn.disabled = false;
      pauseBtn.disabled = true;
      initBoard();
      draw();
      if (gameLoop) clearInterval(gameLoop);
    }

    function gameOver() {
      gameRunning = false;
      if (gameLoop) clearInterval(gameLoop);
      document.getElementById('finalScore').textContent = score;
      gameOverOverlay.classList.add('active');
      startBtn.textContent = t('blocks_start');
      startBtn.disabled = false;
      pauseBtn.disabled = true;
    }

    function goHome() {
      window.location.href = 'index.html';
    }

    // === Touch Controls (use click for both mobile touch and desktop click) ===
    document.getElementById('touchLeft').addEventListener('click', (e) => { e.preventDefault(); moveLeft(); });
    document.getElementById('touchRight').addEventListener('click', (e) => { e.preventDefault(); moveRight(); });
    document.getElementById('touchRotate').addEventListener('click', (e) => { e.preventDefault(); rotateCW(); });
    document.getElementById('touchDown').addEventListener('click', (e) => { e.preventDefault(); if (moveDown()) draw(); });

    // === Keyboard Controls ===
    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft') { e.preventDefault(); moveLeft(); }
      else if (e.key === 'ArrowRight') { e.preventDefault(); moveRight(); }
      else if (e.key === 'ArrowUp') { e.preventDefault(); rotateCW(); }
      else if (e.key === 'ArrowDown') { e.preventDefault(); moveDown(); draw(); }
      else if (e.key === ' ') { e.preventDefault(); hardDrop(); draw(); }
      else if (e.key === 'p' || e.key === 'P') { e.preventDefault(); togglePause(); }
    });

    // === Button Events ===
    startBtn.addEventListener('click', () => { if (!gameRunning) startGame(); });
    pauseBtn.addEventListener('click', () => { togglePause(); });
    restartBtn.addEventListener('click', () => { restartGame(); gameRunning = false; });

    // === Language Support ===
    function updateBlockTexts() {
      if (typeof setLanguage === 'function') {
        // Buttons will be updated via data-i18n
      }
    }

    // Listen for language changes
    window.addEventListener('languageChanged', function(e) {
      // Update dynamic button text
      if (gameRunning && !gamePaused) {
        pauseBtn.textContent = t('blocks_pause');
      } else if (gamePaused) {
        pauseBtn.textContent = t('blocks_resume');
      }
      if (!gameRunning) {
        startBtn.textContent = t('blocks_start');
      }
    });

    // === Start ===
    createStarfield();
    initBoard();
    draw();
    drawNextPiece();
    initLanguage();

    // 隱私權橫幅關閉（事件委派 + 強健 selector）
document.addEventListener('click', function(e) {
  if (e.target.closest('[data-action="dismiss-privacy"]')) {
    var banner = document.querySelector('.privacy-banner, .privacy-notice, #privacyBanner, [data-privacy-banner]');
    if (banner) {
      banner.style.display = 'none';
      banner.classList.add('hidden');
    }
    try { localStorage.setItem('privacyDismissed', 'true'); } catch(err) {}
  }
});

// 確保全域也可呼叫
window.dismissPrivacyBanner = function() {
  var banner = document.querySelector('.privacy-banner, .privacy-notice, #privacyBanner, [data-privacy-banner]');
  if (banner) {
    banner.style.display = 'none';
    banner.classList.add('hidden');
  }
  try { localStorage.setItem('privacyDismissed', 'true'); } catch(err) {}
};

// 頁面載入時檢查是否已關閉過
document.addEventListener('DOMContentLoaded', function() {
  if (localStorage.getItem('privacyDismissed') === 'true') {
    var banner = document.querySelector('.privacy-banner, .privacy-notice, #privacyBanner, [data-privacy-banner]');
    if (banner) {
      banner.style.display = 'none';
      banner.classList.add('hidden');
    }
  }

  var hamburgerBtn = document.getElementById('hamburgerBtn');
  var navLinks = document.getElementById('navLinks');
  if (hamburgerBtn && navLinks) {
    hamburgerBtn.addEventListener('click', function() {
      var isOpen = hamburgerBtn.classList.toggle('active');
      navLinks.classList.toggle('active', isOpen);
      hamburgerBtn.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
    });
    navLinks.addEventListener('click', function(e) {
      if (e.target.tagName === 'A' && window.innerWidth <= 768) {
        hamburgerBtn.classList.remove('active');
        navLinks.classList.remove('active');
        hamburgerBtn.setAttribute('aria-expanded', 'false');
      }
    });
  }
});

    function sanitizeForHTML(str) {
      if (str == null) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }
